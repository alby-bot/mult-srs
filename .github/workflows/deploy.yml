name: Deploy

on:
  push:
    branches: [main, dev]

jobs:
  deploy-production:
    name: Deploy → Production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Prepare dist
        run: mkdir -p dist && cp index.html dist/
      - name: Deploy to GitHub Pages (root)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true   # preserves /dev subfolder
          cname: mult.slef.org

  deploy-staging:
    name: Deploy → Staging
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Prepare dist
        run: mkdir -p dist && cp index.html dist/
      - name: Deploy to GitHub Pages (/dev subfolder)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: dev
          keep_files: true   # preserves root production files
