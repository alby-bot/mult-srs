<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multiplication SRS</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #172554;
      --panel-2: #1e293b;
      --text: #f8fafc;
      --accent: #facc15;
      --ok: #22c55e;
      --bad: #ef4444;
      --muted: #94a3b8;
      --key-a: #334155;
      --key-b: #475569;
      --key-c: #0ea5e9;
      --key-d: #f59e0b;
    }

    * { box-sizing: border-box; }

    html,
    body {
      height: 100%;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 15% 20%, #1e293b 0%, var(--bg) 55%, #020617 100%);
      color: var(--text);
      transition: background-color 120ms ease;
    }

    body.flash-ok {
      background: linear-gradient(180deg, rgba(34, 197, 94, 0.35), rgba(15, 23, 42, 0.95));
    }

    body.flash-bad {
      background: linear-gradient(180deg, rgba(239, 68, 68, 0.35), rgba(15, 23, 42, 0.95));
    }

    .app {
      width: min(960px, 100vw);
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 0.6rem;
      overflow: hidden;
      margin: 0 auto;
      position: relative;
    }

    .pause-btn {
      position: fixed;
      top: 0.6rem;
      right: 0.75rem;
      width: 44px;
      height: 44px;
      min-height: 0;
      border-radius: 999px;
      border: 1px solid rgba(248, 250, 252, 0.35);
      background: rgba(2, 6, 23, 0.75);
      color: var(--text);
      font-size: 1.3rem;
      line-height: 1;
      padding: 0;
      z-index: 30;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(2, 6, 23, 0.84);
      z-index: 9999;
      text-align: center;
      padding: 1rem;
    }

    .overlay.show {
      display: flex;
    }

    .countdown-value {
      font-size: clamp(100px, 25vw, 360px);
      font-weight: 900;
      color: #fef08a;
      text-shadow: 0 8px 28px rgba(0, 0, 0, 0.75);
      line-height: 1;
    }

    .paused-title {
      font-size: clamp(2.2rem, 9vw, 4.4rem);
      font-weight: 800;
      color: var(--accent);
      margin: 0 0 1rem;
    }

    .resume-btn,
    .start-session-btn {
      background: linear-gradient(180deg, #fbbf24, #f59e0b);
      color: #020617;
      font-size: clamp(1rem, 4vw, 1.3rem);
      padding: 0.8rem 1.4rem;
      border-radius: 12px;
      font-weight: 800;
      min-height: 56px;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.1;
      white-space: nowrap;
    }

    .stat-value {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      white-space: nowrap;
    }

    .streak-value {
      font-size: 1rem;
      font-weight: 800;
      line-height: 1;
    }

    .streak-hot {
      color: #fb923c;
      text-shadow: 0 0 8px rgba(249, 115, 22, 0.5);
      animation: streakPulse 1s ease-in-out infinite;
    }

    .speed-fast { color: #4ade80; }
    .speed-good { color: #facc15; }
    .speed-slow { color: #f87171; }

    @keyframes streakPulse {
      0%,
      100% { transform: scale(1); }
      50% { transform: scale(1.07); }
    }

    .topbar {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      color: var(--muted);
      font-size: clamp(0.75rem, 1.8vw, 0.88rem);
      min-height: 1rem;
      white-space: nowrap;
    }

    .question-wrap {
      background: rgba(15, 23, 42, 0.55);
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 18px;
      padding: 0.9rem;
      backdrop-filter: blur(5px);
      min-height: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 0.45rem;
    }

    .question {
      font-size: clamp(60px, 12vw, 120px);
      line-height: 1.1;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.02em;
      min-height: 1.1em;
    }

    .answer {
      font-size: clamp(40px, 8vw, 80px);
      font-weight: 700;
      min-height: 1.2em;
    }

    .status-line {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      min-height: 1.2em;
      white-space: nowrap;
      font-size: clamp(0.85rem, 2.2vw, 1rem);
    }

    .feedback {
      font-weight: 600;
      color: var(--muted);
    }

    .feedback.ok { color: #4ade80; }
    .feedback.bad { color: #f87171; }

    .stats-strip {
      background: rgba(15, 23, 42, 0.62);
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 12px;
      padding: 0.35rem 0.55rem;
      font-size: clamp(12px, 1.5vw, 13px);
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stats-strip .segment { margin-right: 0.5rem; }

    .keypad {
      display: flex;
      flex-direction: row;
      width: min(640px, 100%);
      margin: 0 auto;
      align-items: stretch;
      flex-shrink: 0;
      height: clamp(280px, 36vh, 360px);
    }

    .digit-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      flex: 1;
      min-width: 0;
      height: 100%;
    }

    button {
      border: 0;
      border-radius: 12px;
      color: var(--text);
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 700;
      padding: 0.45rem;
      cursor: pointer;
      transition: transform 80ms ease, filter 120ms ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      min-height: 60px;
    }

    button:active {
      transform: scale(0.97);
      filter: brightness(0.94);
    }

    .digit { background: linear-gradient(180deg, var(--key-b), var(--key-a)); }
    .back { background: linear-gradient(180deg, #64748b, #475569); }
    .check {
      width: 90px;
      margin-left: 8px;
      border-radius: 12px;
      background: #22c55e;
      font-size: 2rem;
      font-weight: 800;
      height: 100%;
      min-height: 0;
    }

    .key-spacer {
      min-height: 60px;
    }

    .actions {
      display: flex;
      justify-content: center;
      margin-top: 0.1rem;
    }

    .reset {
      background: transparent;
      border: 1px solid rgba(248, 250, 252, 0.35);
      color: var(--muted);
      font-size: 0.95rem;
      padding: 0.55rem 0.95rem;
      border-radius: 999px;
    }

    .done {
      display: none;
      text-align: center;
      background: rgba(2, 6, 23, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 18px;
      padding: 2rem 1.2rem;
      gap: 0.8rem;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .done h1 {
      margin: 0;
      font-size: clamp(1.9rem, 7vw, 3rem);
    }

    .done p {
      color: var(--muted);
      margin: 0.4rem 0;
    }

    .hidden { display: none; }

    @media (max-width: 480px) {
      .app { padding: 0.5rem; }
      .question-wrap { padding: 0.65rem; }
      .keypad { height: clamp(260px, 40vh, 330px); }
      .check { width: 84px; }
      .pause-btn {
        top: 0.45rem;
        right: 0.5rem;
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <button class="pause-btn" id="pauseBtn" aria-label="Pause">⏸</button>

    <div class="topbar">
      <div id="dueCount">Due today: 0</div>
    </div>

    <section class="question-wrap" id="quizPane">
      <div class="question" id="question">2 × 2 = ?</div>
      <div class="answer" id="answerDisplay">_</div>
      <div class="status-line">
        <span class="feedback" id="feedback">Type an answer and press Enter</span>
        <span class="stat-label">streak: <span class="streak-value" id="streakValue">0</span> 🔥</span>
      </div>
    </section>

    <section class="stats-strip" id="statsPanel">
      <span class="segment">⏱ <span class="stat-value" id="lastTimeValue">-</span> <span class="stat-label" id="lastSpeedLabel">Last</span></span>
      <span class="segment">| avg <span class="stat-value" id="avgTimeValue">-</span></span>
      <span class="segment">| best <span class="stat-value" id="bestTimeValue">-</span></span>
      <span class="segment">| <span class="stat-value" id="sessionCount">0 ans, 0 ✓</span></span>
      <span class="segment">| <span class="stat-value" id="progress">0/81 mastered</span></span>
    </section>

    <section class="keypad" id="keypad">
      <div class="digit-grid">
        <button class="digit" data-key="1">1</button>
        <button class="digit" data-key="2">2</button>
        <button class="digit" data-key="3">3</button>
        <button class="digit" data-key="4">4</button>
        <button class="digit" data-key="5">5</button>
        <button class="digit" data-key="6">6</button>
        <button class="digit" data-key="7">7</button>
        <button class="digit" data-key="8">8</button>
        <button class="digit" data-key="9">9</button>
        <button class="back" data-key="backspace">⌫</button>
        <button class="digit" data-key="0">0</button>
        <div class="key-spacer" aria-hidden="true"></div>
      </div>
      <button class="check" data-key="enter">=</button>
    </section>

    <div class="actions">
      <button class="reset" id="resetBtn">Reset progress</button>
    </div>

    <section class="done" id="donePane">
      <h1>Session complete! 🎉</h1>
      <p id="doneStats"></p>
      <button class="start-session-btn" id="startSessionBtn">Start New Session</button>
    </section>
  </main>

  <section class="overlay" id="countdownOverlay" aria-live="assertive" aria-hidden="true">
    <div class="countdown-value" id="countdownValue">3</div>
  </section>

  <section class="overlay" id="pausedOverlay" aria-live="polite" aria-hidden="true">
    <h2 class="paused-title">Paused</h2>
    <button class="resume-btn" id="resumeBtn">Resume</button>
  </section>

  <script>
    (function () {
      const STORAGE_KEY = "mult-srs-data";
      const DAY_MS = 86400000;
      const ALL_IDS = [];
      for (let a = 2; a <= 10; a++) {
        for (let b = 2; b <= 10; b++) {
          ALL_IDS.push(`${a}x${b}`);
        }
      }

      const el = {
        question: document.getElementById("question"),
        answer: document.getElementById("answerDisplay"),
        feedback: document.getElementById("feedback"),
        progress: document.getElementById("progress"),
        dueCount: document.getElementById("dueCount"),
        quizPane: document.getElementById("quizPane"),
        donePane: document.getElementById("donePane"),
        doneStats: document.getElementById("doneStats"),
        keypad: document.getElementById("keypad"),
        resetBtn: document.getElementById("resetBtn"),
        streakValue: document.getElementById("streakValue"),
        lastTimeValue: document.getElementById("lastTimeValue"),
        lastSpeedLabel: document.getElementById("lastSpeedLabel"),
        avgTimeValue: document.getElementById("avgTimeValue"),
        bestTimeValue: document.getElementById("bestTimeValue"),
        sessionCount: document.getElementById("sessionCount"),
        pauseBtn: document.getElementById("pauseBtn"),
        countdownOverlay: document.getElementById("countdownOverlay"),
        countdownValue: document.getElementById("countdownValue"),
        pausedOverlay: document.getElementById("pausedOverlay"),
        resumeBtn: document.getElementById("resumeBtn"),
        startSessionBtn: document.getElementById("startSessionBtn")
      };

      let state = loadState();
      let sessionQueue = [];
      let currentCard = null;
      let typed = "";
      let shownAt = performance.now();
      let todayCorrect = 0;
      let todayWrong = 0;
      let isPaused = false;
      let isCountdownActive = false;
      const sessionStats = {
        streak: 0,
        lastTime: null,
        times: [],
        answered: 0,
        correct: 0
      };

      function seedCards() {
        const cards = {};
        const now = Date.now();
        for (const id of ALL_IDS) {
          cards[id] = {
            id,
            interval: 1,
            easeFactor: 2.5,
            dueDate: now,
            lastQuality: null,
            seen: false
          };
        }
        return cards;
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            return { cards: seedCards() };
          }
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object" || !parsed.cards) {
            return { cards: seedCards() };
          }
          const merged = { cards: seedCards() };
          for (const id of ALL_IDS) {
            if (parsed.cards[id]) {
              merged.cards[id] = {
                ...merged.cards[id],
                ...parsed.cards[id]
              };
            }
          }
          return merged;
        } catch (_) {
          return { cards: seedCards() };
        }
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function resetSessionStats() {
        sessionStats.streak = 0;
        sessionStats.lastTime = null;
        sessionStats.times = [];
        sessionStats.answered = 0;
        sessionStats.correct = 0;
        todayCorrect = 0;
        todayWrong = 0;
        updateStatsPanel();
      }

      function buildSessionQueue() {
        const now = Date.now();
        const due = [];
        const fresh = [];

        for (const id of ALL_IDS) {
          const card = state.cards[id];
          if (card.dueDate <= now) {
            due.push(id);
          } else {
            fresh.push(id);
          }
        }

        sessionQueue = [...shuffle(due), ...shuffle(fresh)];
        el.dueCount.textContent = `Due today: ${due.length}`;
      }

      function getMasteredCount() {
        let mastered = 0;
        for (const id of ALL_IDS) {
          const c = state.cards[id];
          if (c.interval >= 21 && c.lastQuality >= 4) {
            mastered += 1;
          }
        }
        return mastered;
      }

      function updateProgress() {
        const mastered = getMasteredCount();
        el.progress.textContent = `${mastered}/81 mastered`;
      }

      function getSpeedMeta(seconds) {
        if (seconds < 1.5) {
          return { label: "⚡ Fast", cls: "speed-fast" };
        }
        if (seconds <= 3) {
          return { label: "✓ Good", cls: "speed-good" };
        }
        return { label: "🔄 Slow", cls: "speed-slow" };
      }

      function updateStatsPanel() {
        el.streakValue.textContent = String(sessionStats.streak);
        el.streakValue.classList.toggle("streak-hot", sessionStats.streak >= 5);

        if (sessionStats.lastTime == null) {
          el.lastTimeValue.textContent = "-";
          el.lastSpeedLabel.textContent = "Last answer";
          el.lastSpeedLabel.className = "stat-label";
        } else {
          const speed = getSpeedMeta(sessionStats.lastTime);
          el.lastTimeValue.textContent = `${sessionStats.lastTime.toFixed(1)}s`;
          el.lastSpeedLabel.textContent = speed.label;
          el.lastSpeedLabel.className = `stat-label ${speed.cls}`;
        }

        if (sessionStats.times.length === 0) {
          el.avgTimeValue.textContent = "-";
          el.bestTimeValue.textContent = "-";
        } else {
          const total = sessionStats.times.reduce((sum, t) => sum + t, 0);
          const avg = total / sessionStats.times.length;
          const best = Math.min(...sessionStats.times);
          el.avgTimeValue.textContent = `${avg.toFixed(1)}s`;
          el.bestTimeValue.textContent = `${best.toFixed(1)}s`;
        }

        el.sessionCount.textContent = `${sessionStats.answered} ans, ${sessionStats.correct} ✓`;
      }

      function setFeedback(text, kind) {
        el.feedback.textContent = text;
        el.feedback.className = "feedback" + (kind ? ` ${kind}` : "");
      }

      function showCard(id) {
        currentCard = state.cards[id];
        const [a, b] = id.split("x").map(Number);
        el.question.textContent = `${a} × ${b} = ?`;
        typed = "";
        renderTyped();
        shownAt = performance.now();
      }

      function renderTyped() {
        el.answer.textContent = typed || "_";
      }

      function setPauseButtonVisibility() {
        const hidePause = isPaused || isCountdownActive || el.donePane.style.display === "flex" || currentCard == null;
        el.pauseBtn.classList.toggle("hidden", hidePause);
      }

      function nextCard() {
        updateProgress();
        if (sessionQueue.length === 0) {
          showDone();
          return;
        }
        hideDone();
        showCard(sessionQueue.shift());
        setPauseButtonVisibility();
      }

      function showDone() {
        currentCard = null;
        el.quizPane.classList.add("hidden");
        el.keypad.classList.add("hidden");
        el.donePane.style.display = "flex";
        const avg = sessionStats.times.length === 0
          ? "-"
          : `${(sessionStats.times.reduce((sum, t) => sum + t, 0) / sessionStats.times.length).toFixed(1)}s`;
        el.doneStats.textContent = `Total answered: ${sessionStats.answered} | Correct: ${sessionStats.correct} | Avg time: ${avg}`;
        setFeedback("Session complete", "ok");
        setPauseButtonVisibility();
      }

      function hideDone() {
        el.quizPane.classList.remove("hidden");
        el.keypad.classList.remove("hidden");
        el.donePane.style.display = "none";
      }

      function cardAnswer(cardId) {
        const [a, b] = cardId.split("x").map(Number);
        return a * b;
      }

      function qualityFromResult(isCorrect, elapsedMs) {
        if (!isCorrect) return 0;
        if (elapsedMs < 1500) return 5;
        if (elapsedMs <= 3000) return 4;
        return 2;
      }

      function messageFromQuality(q, isCorrect) {
        if (!isCorrect) return "✗ Incorrect";
        if (q === 5) return "⚡ Fast!";
        if (q === 4) return "✓ Good";
        return "🔄 Keep practicing";
      }

      function updateCardSRS(card, quality) {
        card.lastQuality = quality;
        card.seen = true;

        const efDelta = 0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02);
        card.easeFactor = Math.max(1.3, Number((card.easeFactor + efDelta).toFixed(2)));

        if (quality === 0) {
          card.interval = 1;
        } else if (card.interval <= 1) {
          card.interval = quality === 2 ? 2 : quality === 4 ? 3 : 4;
        } else {
          const multiplier = quality === 2 ? 1.2 : quality === 4 ? card.easeFactor : card.easeFactor + 0.15;
          card.interval = Math.max(1, Math.round(card.interval * multiplier));
        }

        card.dueDate = Date.now() + card.interval * DAY_MS;
      }

      function flash(kind) {
        document.body.classList.remove("flash-ok", "flash-bad");
        const cls = kind === "ok" ? "flash-ok" : "flash-bad";
        document.body.classList.add(cls);
        setTimeout(() => {
          document.body.classList.remove(cls);
        }, 120);
      }

      function invalidateCurrentCardOnPause() {
        if (!currentCard) return;
        updateCardSRS(currentCard, 0);
        sessionStats.streak = 0;
        todayWrong += 1;
        saveState();
        updateStatsPanel();
        currentCard = null;
        typed = "";
        renderTyped();
      }

      function showPausedOverlay() {
        isPaused = true;
        el.quizPane.classList.add("hidden");
        el.keypad.classList.add("hidden");
        el.pausedOverlay.classList.add("show");
        el.pausedOverlay.setAttribute("aria-hidden", "false");
        setPauseButtonVisibility();
      }

      function hidePausedOverlay() {
        isPaused = false;
        el.pausedOverlay.classList.remove("show");
        el.pausedOverlay.setAttribute("aria-hidden", "true");
        hideDone();
      }

      async function runCountdown() {
        isCountdownActive = true;
        setPauseButtonVisibility();
        el.countdownOverlay.classList.add("show");
        el.countdownOverlay.setAttribute("aria-hidden", "false");

        const sequence = ["3", "2", "1", "GO!"];
        for (const value of sequence) {
          el.countdownValue.textContent = value;
          const delay = value === "GO!" ? 420 : 1000;
          await new Promise((resolve) => setTimeout(resolve, delay));
        }

        el.countdownOverlay.classList.remove("show");
        el.countdownOverlay.setAttribute("aria-hidden", "true");
        isCountdownActive = false;
        setPauseButtonVisibility();
      }

      async function startCountdownThenNextCard() {
        hideDone();
        await runCountdown();
        nextCard();
      }

      function submitAnswer() {
        if (!currentCard || typed.length === 0 || isPaused || isCountdownActive) return;

        const expected = cardAnswer(currentCard.id);
        const entered = Number(typed);
        const isCorrect = entered === expected;
        const elapsed = performance.now() - shownAt;
        const elapsedSec = elapsed / 1000;
        const quality = qualityFromResult(isCorrect, elapsed);

        sessionStats.answered += 1;
        sessionStats.lastTime = elapsedSec;
        if (isCorrect) {
          sessionStats.correct += 1;
          sessionStats.streak += 1;
          sessionStats.times.push(elapsedSec);
        } else {
          sessionStats.streak = 0;
        }
        updateStatsPanel();

        updateCardSRS(currentCard, quality);
        saveState();

        if (isCorrect) {
          todayCorrect += 1;
          flash("ok");
          setFeedback(messageFromQuality(quality, true), "ok");
          setTimeout(nextCard, 180);
        } else {
          todayWrong += 1;
          flash("bad");
          setFeedback(`${messageFromQuality(quality, false)}  ${currentCard.id.replace("x", " × ")} = ${expected}`, "bad");
          setTimeout(nextCard, 520);
        }
      }

      function onInputKey(key) {
        if (!currentCard || isPaused || isCountdownActive || el.donePane.style.display === "flex") return;
        if (/^\d$/.test(key)) {
          if (typed.length < 3) {
            typed += key;
            renderTyped();
          }
          return;
        }
        if (key === "backspace") {
          typed = typed.slice(0, -1);
          renderTyped();
          return;
        }
        if (key === "enter") {
          submitAnswer();
        }
      }

      async function startNewSession() {
        resetSessionStats();
        buildSessionQueue();
        setFeedback("Type an answer and press Enter", null);
        await startCountdownThenNextCard();
      }

      function pauseSession() {
        if (!currentCard || isPaused || isCountdownActive || el.donePane.style.display === "flex") return;
        invalidateCurrentCardOnPause();
        showPausedOverlay();
      }

      async function resumeSession() {
        if (!isPaused) return;
        hidePausedOverlay();
        await startCountdownThenNextCard();
      }

      function resetProgress() {
        if (!window.confirm("Reset all progress? This cannot be undone.")) return;
        state = { cards: seedCards() };
        saveState();
        setFeedback("Progress reset", null);
        startNewSession();
      }

      document.addEventListener("keydown", (event) => {
        if (event.key >= "0" && event.key <= "9") onInputKey(event.key);
        else if (event.key === "Backspace") onInputKey("backspace");
        else if (event.key === "Enter" || event.key === "=") onInputKey("enter");
      });

      el.keypad.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const key = target.dataset.key;
        if (!key) return;
        onInputKey(key);
      });

      el.resetBtn.addEventListener("click", resetProgress);
      el.pauseBtn.addEventListener("click", pauseSession);
      el.resumeBtn.addEventListener("click", resumeSession);
      el.startSessionBtn.addEventListener("click", startNewSession);

      updateProgress();
      updateStatsPanel();
      startNewSession();
    })();
  </script>
</body>
</html>
