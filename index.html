<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multiplication SRS</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #172554;
      --panel-2: #1e293b;
      --text: #f8fafc;
      --accent: #facc15;
      --ok: #22c55e;
      --bad: #ef4444;
      --muted: #94a3b8;
      --key-a: #334155;
      --key-b: #475569;
      --key-c: #0ea5e9;
      --key-d: #f59e0b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 15% 20%, #1e293b 0%, var(--bg) 55%, #020617 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background-color 120ms ease;
    }

    body.flash-ok {
      background: linear-gradient(180deg, rgba(34, 197, 94, 0.35), rgba(15, 23, 42, 0.95));
    }

    body.flash-bad {
      background: linear-gradient(180deg, rgba(239, 68, 68, 0.35), rgba(15, 23, 42, 0.95));
    }

    .app {
      width: min(960px, 96vw);
      display: grid;
      gap: 1rem;
      padding: 1rem;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 0.95rem;
      min-height: 1.5rem;
    }

    .question-wrap {
      background: rgba(15, 23, 42, 0.55);
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 18px;
      padding: 1.5rem 1rem;
      text-align: center;
      backdrop-filter: blur(5px);
    }

    .question {
      font-size: clamp(3rem, 11vw, 6rem);
      line-height: 1.1;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.02em;
      min-height: 1.1em;
    }

    .answer {
      margin-top: 0.6rem;
      font-size: clamp(2rem, 8vw, 4.5rem);
      font-weight: 700;
      min-height: 1.2em;
    }

    .feedback {
      min-height: 1.4em;
      text-align: center;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--muted);
    }

    .feedback.ok { color: #4ade80; }
    .feedback.bad { color: #f87171; }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, minmax(80px, 1fr));
      gap: 0.7rem;
      width: min(560px, 100%);
      margin: 0 auto;
    }

    button {
      border: 0;
      border-radius: 14px;
      color: var(--text);
      font-size: clamp(1.2rem, 5vw, 1.65rem);
      font-weight: 700;
      padding: 0.9rem;
      cursor: pointer;
      transition: transform 80ms ease, filter 120ms ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    button:active {
      transform: scale(0.97);
      filter: brightness(0.94);
    }

    .digit { background: linear-gradient(180deg, var(--key-b), var(--key-a)); }
    .back { background: linear-gradient(180deg, #64748b, #475569); }
    .check { background: linear-gradient(180deg, var(--key-d), #d97706); }
    .zero { grid-column: span 2; }

    .actions {
      display: flex;
      justify-content: center;
      margin-top: 0.3rem;
    }

    .reset {
      background: transparent;
      border: 1px solid rgba(248, 250, 252, 0.35);
      color: var(--muted);
      font-size: 0.95rem;
      padding: 0.55rem 0.95rem;
      border-radius: 999px;
    }

    .done {
      display: none;
      text-align: center;
      background: rgba(2, 6, 23, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 18px;
      padding: 2rem 1.2rem;
    }

    .done h1 {
      margin: 0;
      font-size: clamp(1.9rem, 7vw, 3rem);
    }

    .done p {
      color: var(--muted);
      margin: 0.65rem 0;
    }

    .hidden { display: none; }

    @media (max-width: 480px) {
      .app { padding: 0.7rem; }
      .question-wrap { padding: 1rem 0.7rem; }
      .keypad { gap: 0.55rem; }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <div class="topbar">
      <div id="progress">0/81 mastered</div>
      <div id="dueCount">Due today: 0</div>
    </div>

    <section class="question-wrap" id="quizPane">
      <div class="question" id="question">2 × 2 = ?</div>
      <div class="answer" id="answerDisplay">_</div>
    </section>

    <div class="feedback" id="feedback">Type an answer and press Enter</div>

    <section class="keypad" id="keypad">
      <button class="digit" data-key="1">1</button>
      <button class="digit" data-key="2">2</button>
      <button class="digit" data-key="3">3</button>
      <button class="digit" data-key="4">4</button>
      <button class="digit" data-key="5">5</button>
      <button class="digit" data-key="6">6</button>
      <button class="digit" data-key="7">7</button>
      <button class="digit" data-key="8">8</button>
      <button class="digit" data-key="9">9</button>
      <button class="back" data-key="backspace">⌫</button>
      <button class="digit zero" data-key="0">0</button>
      <button class="check" data-key="enter">=</button>
    </section>

    <div class="actions">
      <button class="reset" id="resetBtn">Reset progress</button>
    </div>

    <section class="done" id="donePane">
      <h1>Come back tomorrow!</h1>
      <p id="doneStats"></p>
      <p>All due cards are complete for today.</p>
    </section>
  </main>

  <script>
    (function () {
      const STORAGE_KEY = "mult-srs-data";
      const DAY_MS = 86400000;
      const ALL_IDS = [];
      for (let a = 2; a <= 10; a++) {
        for (let b = 2; b <= 10; b++) {
          ALL_IDS.push(`${a}x${b}`);
        }
      }

      const el = {
        question: document.getElementById("question"),
        answer: document.getElementById("answerDisplay"),
        feedback: document.getElementById("feedback"),
        progress: document.getElementById("progress"),
        dueCount: document.getElementById("dueCount"),
        quizPane: document.getElementById("quizPane"),
        donePane: document.getElementById("donePane"),
        doneStats: document.getElementById("doneStats"),
        keypad: document.getElementById("keypad"),
        resetBtn: document.getElementById("resetBtn")
      };

      let state = loadState();
      let sessionQueue = [];
      let currentCard = null;
      let typed = "";
      let shownAt = performance.now();
      let todayCorrect = 0;
      let todayWrong = 0;

      function seedCards() {
        const cards = {};
        const now = Date.now();
        for (const id of ALL_IDS) {
          cards[id] = {
            id,
            interval: 1,
            easeFactor: 2.5,
            dueDate: now,
            lastQuality: null,
            seen: false
          };
        }
        return cards;
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            return { cards: seedCards() };
          }
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object" || !parsed.cards) {
            return { cards: seedCards() };
          }
          const merged = { cards: seedCards() };
          for (const id of ALL_IDS) {
            if (parsed.cards[id]) {
              merged.cards[id] = {
                ...merged.cards[id],
                ...parsed.cards[id]
              };
            }
          }
          return merged;
        } catch (_) {
          return { cards: seedCards() };
        }
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function buildSessionQueue() {
        const now = Date.now();
        const due = [];
        const fresh = [];

        for (const id of ALL_IDS) {
          const card = state.cards[id];
          if (card.seen && card.dueDate <= now) {
            due.push(id);
          } else if (!card.seen) {
            fresh.push(id);
          }
        }

        sessionQueue = [...shuffle(due), ...shuffle(fresh)];
        el.dueCount.textContent = `Due today: ${due.length}`;
      }

      function getMasteredCount() {
        let mastered = 0;
        for (const id of ALL_IDS) {
          const c = state.cards[id];
          if (c.interval >= 21 && c.lastQuality >= 4) {
            mastered += 1;
          }
        }
        return mastered;
      }

      function updateProgress() {
        const mastered = getMasteredCount();
        el.progress.textContent = `${mastered}/81 mastered`;
      }

      function setFeedback(text, kind) {
        el.feedback.textContent = text;
        el.feedback.className = "feedback" + (kind ? ` ${kind}` : "");
      }

      function showCard(id) {
        currentCard = state.cards[id];
        const [a, b] = id.split("x").map(Number);
        el.question.textContent = `${a} × ${b} = ?`;
        typed = "";
        renderTyped();
        shownAt = performance.now();
      }

      function renderTyped() {
        el.answer.textContent = typed || "_";
      }

      function nextCard() {
        updateProgress();
        if (sessionQueue.length === 0) {
          showDone();
          return;
        }
        hideDone();
        showCard(sessionQueue.shift());
      }

      function showDone() {
        el.quizPane.classList.add("hidden");
        el.keypad.classList.add("hidden");
        el.donePane.style.display = "block";
        el.doneStats.textContent = `Today: ${todayCorrect} correct, ${todayWrong} wrong.`;
        setFeedback("Session complete", "ok");
      }

      function hideDone() {
        el.quizPane.classList.remove("hidden");
        el.keypad.classList.remove("hidden");
        el.donePane.style.display = "none";
      }

      function cardAnswer(cardId) {
        const [a, b] = cardId.split("x").map(Number);
        return a * b;
      }

      function qualityFromResult(isCorrect, elapsedMs) {
        if (!isCorrect) return 0;
        if (elapsedMs < 1500) return 5;
        if (elapsedMs <= 3000) return 4;
        return 2;
      }

      function messageFromQuality(q, isCorrect) {
        if (!isCorrect) return "✗ Incorrect";
        if (q === 5) return "⚡ Fast!";
        if (q === 4) return "✓ Good";
        return "🔄 Keep practicing";
      }

      function updateCardSRS(card, quality) {
        card.lastQuality = quality;
        card.seen = true;

        const efDelta = 0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02);
        card.easeFactor = Math.max(1.3, Number((card.easeFactor + efDelta).toFixed(2)));

        if (quality === 0) {
          card.interval = 1;
        } else if (card.interval <= 1) {
          card.interval = quality === 2 ? 2 : quality === 4 ? 3 : 4;
        } else {
          const multiplier = quality === 2 ? 1.2 : quality === 4 ? card.easeFactor : card.easeFactor + 0.15;
          card.interval = Math.max(1, Math.round(card.interval * multiplier));
        }

        card.dueDate = Date.now() + card.interval * DAY_MS;
      }

      function flash(kind) {
        document.body.classList.remove("flash-ok", "flash-bad");
        const cls = kind === "ok" ? "flash-ok" : "flash-bad";
        document.body.classList.add(cls);
        setTimeout(() => {
          document.body.classList.remove(cls);
        }, 120);
      }

      function submitAnswer() {
        if (!currentCard || typed.length === 0) return;

        const expected = cardAnswer(currentCard.id);
        const entered = Number(typed);
        const isCorrect = entered === expected;
        const elapsed = performance.now() - shownAt;
        const quality = qualityFromResult(isCorrect, elapsed);

        updateCardSRS(currentCard, quality);
        saveState();

        if (isCorrect) {
          todayCorrect += 1;
          flash("ok");
          setFeedback(messageFromQuality(quality, true), "ok");
          setTimeout(nextCard, 180);
        } else {
          todayWrong += 1;
          flash("bad");
          setFeedback(`${messageFromQuality(quality, false)}  ${currentCard.id.replace("x", " × ")} = ${expected}`, "bad");
          setTimeout(nextCard, 520);
        }
      }

      function onInputKey(key) {
        if (!currentCard) return;
        if (/^\d$/.test(key)) {
          if (typed.length < 3) {
            typed += key;
            renderTyped();
          }
          return;
        }
        if (key === "backspace") {
          typed = typed.slice(0, -1);
          renderTyped();
          return;
        }
        if (key === "enter") {
          submitAnswer();
        }
      }

      function resetProgress() {
        if (!window.confirm("Reset all progress? This cannot be undone.")) return;
        state = { cards: seedCards() };
        todayCorrect = 0;
        todayWrong = 0;
        saveState();
        buildSessionQueue();
        setFeedback("Progress reset", null);
        nextCard();
      }

      document.addEventListener("keydown", (event) => {
        if (event.key >= "0" && event.key <= "9") onInputKey(event.key);
        else if (event.key === "Backspace") onInputKey("backspace");
        else if (event.key === "Enter" || event.key === "=") onInputKey("enter");
      });

      el.keypad.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const key = target.dataset.key;
        if (!key) return;
        onInputKey(key);
      });

      el.resetBtn.addEventListener("click", resetProgress);

      buildSessionQueue();
      updateProgress();
      nextCard();
    })();
  </script>
</body>
</html>
