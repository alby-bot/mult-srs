<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Multiplication SRS</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #172554;
      --panel-2: #1e293b;
      --text: #f8fafc;
      --accent: #facc15;
      --ok: #22c55e;
      --bad: #ef4444;
      --muted: #94a3b8;
      --key-a: #334155;
      --key-b: #475569;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 15% 20%, #1e293b 0%, #0f172a 55%, #020617 100%);
      color: #f8fafc;
      -webkit-text-size-adjust: 100%;
    }

    body.flash-ok  { background: linear-gradient(180deg, rgba(34,197,94,0.35), rgba(15,23,42,0.95)); }
    body.flash-bad { background: linear-gradient(180deg, rgba(239,68,68,0.35), rgba(15,23,42,0.95)); }

    /* ── Layout shell ── */
    .app {
      width: 100%;
      max-width: 960px;
      height: 100%;
      height: 100vh;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      padding: 0.6rem;
      overflow: hidden;
      margin: 0 auto;
      position: relative;
      gap: 0.4rem;
    }

    /* ── Topbar ── */
    .topbar {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      color: #94a3b8;
      font-size: 0.82rem;
      min-height: 1.8rem;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
    }

    .topbar-left {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      gap: 0.5rem;
    }

    .player-name {
      font-weight: 700;
      color: #facc15;
      font-size: 0.9rem;
      cursor: pointer;
      border-bottom: 1px dashed rgba(250,204,21,0.4);
    }
    .player-name:empty::before { content: "Tap to set name"; color: #94a3b8; font-weight: 400; }

    .topbar-right {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      gap: 0.4rem;
    }

    /* ── Pause & Settings buttons ── */
    .icon-btn {
      width: 44px;
      height: 44px;
      min-height: 0;
      border-radius: 50%;
      border: 2px solid rgba(248,250,252,0.4);
      background: rgba(30,41,59,0.9);
      color: #f8fafc;
      font-size: 1.2rem;
      line-height: 1;
      padding: 0;
      cursor: pointer;
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
    }
    .pause-btn { background: rgba(239,68,68,0.25); border-color: rgba(239,68,68,0.6); }

    /* ── Main content area (question + sidebar on tablet) ── */
    .content-area {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: row;
      flex-direction: row;
      -webkit-flex: 1;
      flex: 1;
      min-height: 0;
      gap: 0.5rem;
    }

    /* ── Stats sidebar (tablet ≥ 600px) ── */
    .stats-sidebar {
      display: none;
      -webkit-flex-direction: column;
      flex-direction: column;
      gap: 0.6rem;
      width: 130px;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
    }

    .stat-card {
      background: rgba(15,23,42,0.7);
      border: 1px solid rgba(148,163,184,0.2);
      border-radius: 12px;
      padding: 0.55rem 0.6rem;
      text-align: center;
    }

    .stat-num {
      font-size: 1.9rem;
      font-weight: 800;
      line-height: 1.1;
      color: #f8fafc;
    }

    .stat-lbl {
      font-size: 0.72rem;
      color: #94a3b8;
      margin-top: 0.1rem;
    }

    .streak-hot { color: #fb923c; }

    .speed-fast { color: #4ade80; }
    .speed-good { color: #facc15; }
    .speed-slow { color: #f87171; }

    /* ── Question pane ── */
    .question-wrap {
      background: rgba(15,23,42,0.55);
      border: 1px solid rgba(148,163,184,0.22);
      border-radius: 18px;
      padding: 0.9rem;
      -webkit-flex: 1;
      flex: 1;
      min-width: 0;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-justify-content: center;
      justify-content: center;
      -webkit-align-items: center;
      align-items: center;
      text-align: center;
      gap: 0.4rem;
    }

    .greeting {
      font-size: 1rem;
      color: #94a3b8;
      min-height: 1.2em;
    }

    .question {
      font-size: 80px;
      font-size: clamp(60px, 12vw, 120px);
      line-height: 1.1;
      font-weight: 800;
      color: #facc15;
      letter-spacing: 0.02em;
    }

    .answer-display {
      font-size: 56px;
      font-size: clamp(40px, 8vw, 80px);
      font-weight: 700;
      min-height: 1.2em;
      color: #f8fafc;
    }

    .feedback {
      font-size: 1rem;
      font-weight: 600;
      color: #94a3b8;
      min-height: 1.3em;
    }
    .feedback.ok  { color: #4ade80; }
    .feedback.bad { color: #f87171; }

    /* ── Stats strip (mobile, below question) ── */
    .stats-strip {
      background: rgba(15,23,42,0.62);
      border: 1px solid rgba(148,163,184,0.24);
      border-radius: 10px;
      padding: 0.3rem 0.5rem;
      font-size: 12px;
      color: #94a3b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
    }
    .stats-strip .seg { margin-right: 0.5rem; }
    .stats-strip .val { font-weight: 700; color: #f8fafc; }

    /* ── Keypad ── */
    .keypad {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: row;
      flex-direction: row;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      -webkit-align-items: stretch;
      align-items: stretch;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
      height: 300px;
      gap: 8px;
    }

    .digit-grid {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-wrap: wrap;
      flex-wrap: wrap;
      -webkit-flex: 1;
      flex: 1;
      gap: 8px;
      -webkit-align-content: stretch;
      align-content: stretch;
    }

    .digit-grid button {
      width: calc(33.333% - 6px);
      -webkit-flex: none;
      flex: none;
      height: calc(25% - 6px);
    }

    button {
      border: 0;
      border-radius: 12px;
      color: #f8fafc;
      font-size: 24px;
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 700;
      padding: 0.3rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      background: linear-gradient(180deg, #475569, #334155);
    }

    button:active { opacity: 0.75; }

    .btn-back { background: linear-gradient(180deg, #64748b, #475569); }
    .btn-check {
      width: 88px;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
      border-radius: 14px;
      background: #16a34a;
      font-size: 2rem;
      font-weight: 900;
      color: #fff;
      height: 100%;
    }
    .btn-spacer {
      width: calc(33.333% - 6px);
      height: calc(25% - 6px);
      -webkit-flex: none;
      flex: none;
      background: transparent;
      pointer-events: none;
    }

    /* ── Bottom actions ── */
    .actions {
      display: -webkit-flex;
      display: flex;
      -webkit-justify-content: center;
      justify-content: center;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
    }
    .btn-reset {
      background: transparent;
      border: 1px solid rgba(248,250,252,0.3);
      color: #94a3b8;
      font-size: 0.85rem;
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      touch-action: manipulation;
    }

    /* ── Done screen ── */
    .done-pane {
      display: none;
      -webkit-flex: 1;
      flex: 1;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      text-align: center;
      gap: 0.8rem;
      background: rgba(2,6,23,0.7);
      border: 1px solid rgba(148,163,184,0.25);
      border-radius: 18px;
      padding: 2rem 1rem;
    }
    .done-pane h1 { margin: 0; font-size: 2.2rem; }
    .done-pane p  { color: #94a3b8; margin: 0; font-size: 0.95rem; }
    .btn-new-session {
      background: linear-gradient(180deg, #fbbf24, #f59e0b);
      color: #020617;
      font-size: 1.15rem;
      padding: 0.75rem 1.4rem;
      border-radius: 12px;
      font-weight: 800;
      touch-action: manipulation;
      min-height: 52px;
    }

    /* ── Overlays ── */
    .overlay {
      position: fixed;
      top: 0; right: 0; bottom: 0; left: 0;
      display: none;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      -webkit-flex-direction: column;
      flex-direction: column;
      background: rgba(2,6,23,0.88);
      z-index: 9999;
      text-align: center;
      padding: 1.5rem;
    }
    .overlay.show { display: -webkit-flex; display: flex; }

    .countdown-num {
      font-size: 160px;
      font-size: clamp(100px, 25vw, 280px);
      font-weight: 900;
      color: #fef08a;
      line-height: 1;
      text-shadow: 0 6px 24px rgba(0,0,0,0.7);
    }

    .paused-title {
      font-size: 2.5rem;
      font-weight: 800;
      color: #facc15;
      margin: 0 0 1.2rem;
    }

    .btn-resume {
      background: linear-gradient(180deg, #fbbf24, #f59e0b);
      color: #020617;
      font-size: 1.2rem;
      padding: 0.8rem 1.6rem;
      border-radius: 12px;
      font-weight: 800;
      touch-action: manipulation;
      min-height: 52px;
    }

    /* ── Settings overlay ── */
    .settings-panel {
      background: #1e293b;
      border-radius: 18px;
      padding: 1.4rem;
      width: 100%;
      max-width: 380px;
      text-align: left;
    }
    .settings-panel h2 { margin: 0 0 1rem; font-size: 1.3rem; color: #facc15; }
    .setting-row {
      display: -webkit-flex;
      display: flex;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      -webkit-align-items: center;
      align-items: center;
      margin-bottom: 0.9rem;
    }
    .setting-row label { font-size: 0.9rem; color: #94a3b8; }
    .setting-row input[type=number], .setting-row input[type=text] {
      width: 80px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f8fafc;
      font-size: 1rem;
      padding: 0.35rem 0.5rem;
      text-align: center;
    }
    .settings-panel input[type=text] { width: 140px; text-align: left; }
    .btn-settings-save {
      width: 100%;
      background: #22c55e;
      color: #020617;
      font-size: 1rem;
      font-weight: 800;
      padding: 0.7rem;
      border-radius: 10px;
      margin-top: 0.5rem;
      touch-action: manipulation;
    }

    /* ── Hidden ── */
    .hidden { display: none !important; }

    /* ── Tablet: sidebar visible ── */
    @media (min-width: 600px) {
      .stats-sidebar { display: -webkit-flex; display: flex; }
      .stats-strip   { display: none; }
      .keypad        { height: 320px; }
    }

    @media (max-width: 599px) {
      .keypad { height: 260px; gap: 6px; }
      .digit-grid { gap: 6px; }
      .digit-grid button { width: calc(33.333% - 4px); }
      .btn-check { width: 76px; }
    }
  </style>
</head>
<body>
  <main class="app" id="app">

    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-left">
        <span id="dueCount" style="color:#94a3b8;">Due: 0</span>
        <span class="player-name" id="playerName" tabindex="0"></span>
      </div>
      <div class="topbar-right">
        <button class="icon-btn pause-btn hidden" id="pauseBtn" aria-label="Pause">⏸</button>
        <button class="icon-btn" id="settingsBtn" aria-label="Settings">⚙️</button>
      </div>
    </div>

    <!-- Content: sidebar + question -->
    <div class="content-area" id="contentArea">

      <!-- Stats sidebar (tablet) -->
      <aside class="stats-sidebar" id="statsSidebar">
        <div class="stat-card">
          <div class="stat-num" id="sStreak">0</div>
          <div class="stat-lbl">🔥 Streak</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="sLast">—</div>
          <div class="stat-lbl" id="sLastLbl">Last</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="sAvg">—</div>
          <div class="stat-lbl">Avg time</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="sBest">—</div>
          <div class="stat-lbl">Best</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="sScore">0/0</div>
          <div class="stat-lbl">Correct</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="sMastered">0</div>
          <div class="stat-lbl">Mastered</div>
        </div>
      </aside>

      <!-- Quiz pane -->
      <section class="question-wrap" id="quizPane">
        <div class="greeting" id="greeting"></div>
        <div class="question" id="question">—</div>
        <div class="answer-display" id="answerDisplay">_</div>
        <div class="feedback" id="feedback">Tap a number to begin</div>
      </section>

      <!-- Done pane (inside content-area so it fills same space) -->
      <section class="done-pane" id="donePane">
        <h1>Session complete! 🎉</h1>
        <p id="doneStats"></p>
        <button class="btn-new-session" id="btnNewSession">Start New Session</button>
      </section>

    </div><!-- .content-area -->

    <!-- Stats strip (mobile) -->
    <div class="stats-strip" id="statsStrip">
      <span class="seg">🔥<span class="val" id="mStreak">0</span></span>
      <span class="seg">⏱<span class="val" id="mLast">—</span></span>
      <span class="seg">avg <span class="val" id="mAvg">—</span></span>
      <span class="seg">best <span class="val" id="mBest">—</span></span>
      <span class="seg"><span class="val" id="mScore">0/0</span></span>
      <span class="seg"><span class="val" id="mMastered">0</span>/81 ✓</span>
    </div>

    <!-- Keypad -->
    <section class="keypad" id="keypad">
      <div class="digit-grid">
        <button data-key="1">1</button>
        <button data-key="2">2</button>
        <button data-key="3">3</button>
        <button data-key="4">4</button>
        <button data-key="5">5</button>
        <button data-key="6">6</button>
        <button data-key="7">7</button>
        <button data-key="8">8</button>
        <button data-key="9">9</button>
        <button class="btn-back" data-key="backspace">⌫</button>
        <button data-key="0">0</button>
        <div class="btn-spacer"></div>
      </div>
      <button class="btn-check" data-key="enter">=</button>
    </section>

    <!-- Actions -->
    <div class="actions">
      <button class="btn-reset" id="btnReset">Reset progress</button>
    </div>

  </main>

  <!-- Countdown overlay -->
  <div class="overlay" id="overlayCountdown">
    <div class="countdown-num" id="countdownNum">3</div>
  </div>

  <!-- Paused overlay -->
  <div class="overlay" id="overlayPaused">
    <div class="paused-title">Paused</div>
    <button class="btn-resume" id="btnResume">Resume</button>
  </div>

  <!-- Settings overlay -->
  <div class="overlay" id="overlaySettings">
    <div class="settings-panel">
      <h2>⚙️ Settings</h2>
      <div class="setting-row">
        <label>Your name</label>
        <input type="text" id="cfgName" placeholder="e.g. Ari" />
      </div>
      <div class="setting-row">
        <label>Tables from</label>
        <input type="number" id="cfgMin" min="2" max="10" value="2" />
      </div>
      <div class="setting-row">
        <label>Tables to</label>
        <input type="number" id="cfgMax" min="2" max="10" value="10" />
      </div>
      <div class="setting-row">
        <label>Fast threshold (s)</label>
        <input type="number" id="cfgFast" min="0.5" max="5" step="0.5" value="1.5" />
      </div>
      <div class="setting-row">
        <label>Good threshold (s)</label>
        <input type="number" id="cfgGood" min="1" max="10" step="0.5" value="3.0" />
      </div>
      <button class="btn-settings-save" id="btnSettingsSave">Save &amp; Close</button>
    </div>
  </div>

  <script>
  (function () {
    var STORAGE_KEY  = "mult-srs-data";
    var SETTINGS_KEY = "mult-srs-cfg";
    var DAY_MS = 86400000;

    /* ── Settings ── */
    var cfg = {
      name: "",
      minT: 2,
      maxT: 10,
      fastMs: 1500,
      goodMs: 3000
    };

    function loadCfg() {
      try {
        var raw = localStorage.getItem(SETTINGS_KEY);
        if (!raw) return;
        var p = JSON.parse(raw);
        if (p.name  !== undefined) cfg.name   = p.name;
        if (p.minT  !== undefined) cfg.minT   = p.minT;
        if (p.maxT  !== undefined) cfg.maxT   = p.maxT;
        if (p.fastMs!== undefined) cfg.fastMs = p.fastMs;
        if (p.goodMs!== undefined) cfg.goodMs = p.goodMs;
      } catch(e) {}
    }

    function saveCfg() {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(cfg));
    }

    function buildAllIds() {
      var ids = [];
      for (var a = cfg.minT; a <= cfg.maxT; a++) {
        for (var b = cfg.minT; b <= cfg.maxT; b++) {
          ids.push(a + "x" + b);
        }
      }
      return ids;
    }

    /* ── State ── */
    var state = { cards: {} };
    var ALL_IDS = [];

    function seedCards() {
      var cards = {};
      var now = Date.now();
      for (var i = 0; i < ALL_IDS.length; i++) {
        var id = ALL_IDS[i];
        cards[id] = { id: id, interval: 1, easeFactor: 2.5, dueDate: now, lastQuality: null };
      }
      return cards;
    }

    function loadState() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { cards: seedCards() };
        var p = JSON.parse(raw);
        if (!p || !p.cards) return { cards: seedCards() };
        var cards = seedCards();
        for (var i = 0; i < ALL_IDS.length; i++) {
          var id = ALL_IDS[i];
          if (p.cards[id]) {
            cards[id] = {
              id: id,
              interval:   p.cards[id].interval   || 1,
              easeFactor: p.cards[id].easeFactor  || 2.5,
              dueDate:    p.cards[id].dueDate     || Date.now(),
              lastQuality:p.cards[id].lastQuality || null
            };
          }
        }
        return { cards: cards };
      } catch(e) {
        return { cards: seedCards() };
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    /* ── Session ── */
    var sessionQueue  = [];
    var currentCard   = null;
    var typed         = "";
    var shownAt       = 0;
    var isPaused      = false;
    var isCountdown   = false;
    var ss = { streak:0, lastSec:null, times:[], answered:0, correct:0 };

    function shuffle(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
      }
      return a;
    }

    function buildQueue() {
      var now = Date.now();
      var due = [], fresh = [];
      for (var i = 0; i < ALL_IDS.length; i++) {
        var card = state.cards[ALL_IDS[i]];
        if (card.dueDate <= now) due.push(ALL_IDS[i]);
        else                     fresh.push(ALL_IDS[i]);
      }
      sessionQueue = shuffle(due).concat(shuffle(fresh));
      el("dueCount").textContent = "Due: " + due.length;
    }

    function resetSS() {
      ss = { streak:0, lastSec:null, times:[], answered:0, correct:0 };
    }

    /* ── DOM helpers ── */
    function el(id) { return document.getElementById(id); }

    function setFeedback(txt, kind) {
      var f = el("feedback");
      f.textContent = txt;
      f.className = "feedback" + (kind ? " " + kind : "");
    }

    function getMastered() {
      var n = 0;
      for (var i = 0; i < ALL_IDS.length; i++) {
        var c = state.cards[ALL_IDS[i]];
        if (c.interval >= 21 && c.lastQuality >= 4) n++;
      }
      return n;
    }

    function arrMin(arr) {
      var m = arr[0];
      for (var i = 1; i < arr.length; i++) if (arr[i] < m) m = arr[i];
      return m;
    }
    function arrSum(arr) {
      var s = 0;
      for (var i = 0; i < arr.length; i++) s += arr[i];
      return s;
    }

    function updateStats() {
      var mastered = getMastered();
      var streak   = ss.streak;
      var lastStr  = ss.lastSec !== null ? ss.lastSec.toFixed(1) + "s" : "—";
      var lastLbl  = "Last";
      var lastCls  = "";
      if (ss.lastSec !== null) {
        if (ss.lastSec * 1000 < cfg.fastMs) { lastLbl = "⚡ Fast"; lastCls = "speed-fast"; }
        else if (ss.lastSec * 1000 <= cfg.goodMs) { lastLbl = "✓ Good"; lastCls = "speed-good"; }
        else { lastLbl = "🔄 Slow"; lastCls = "speed-slow"; }
      }
      var avgStr = "—", bestStr = "—";
      if (ss.times.length > 0) {
        avgStr  = (arrSum(ss.times) / ss.times.length).toFixed(1) + "s";
        bestStr = arrMin(ss.times).toFixed(1) + "s";
      }
      var scoreStr = ss.correct + "/" + ss.answered;

      /* sidebar */
      var sStreak = el("sStreak");
      sStreak.textContent = streak;
      sStreak.className = "stat-num" + (streak >= 5 ? " streak-hot" : "");
      el("sLast").textContent    = lastStr;
      var sLastLbl = el("sLastLbl");
      sLastLbl.textContent = lastLbl;
      sLastLbl.className = "stat-lbl" + (lastCls ? " " + lastCls : "");
      el("sAvg").textContent     = avgStr;
      el("sBest").textContent    = bestStr;
      el("sScore").textContent   = scoreStr;
      el("sMastered").textContent= mastered;

      /* strip */
      el("mStreak").textContent  = streak;
      el("mLast").textContent    = lastStr;
      el("mAvg").textContent     = avgStr;
      el("mBest").textContent    = bestStr;
      el("mScore").textContent   = scoreStr;
      el("mMastered").textContent= mastered;
    }

    function updateGreeting() {
      el("greeting").textContent = cfg.name ? "Hi, " + cfg.name + "!" : "";
    }

    function updatePlayerName() {
      el("playerName").textContent = cfg.name || "";
    }

    /* ── SRS ── */
    function updateSRS(card, quality) {
      card.lastQuality = quality;
      var delta = 0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02);
      card.easeFactor = Math.max(1.3, card.easeFactor + delta);
      if (quality === 0) {
        card.interval = 1;
      } else if (card.interval <= 1) {
        card.interval = quality === 2 ? 2 : quality === 4 ? 3 : 4;
      } else {
        var m = quality === 2 ? 1.2 : quality === 4 ? card.easeFactor : card.easeFactor + 0.15;
        card.interval = Math.max(1, Math.round(card.interval * m));
      }
      card.dueDate = Date.now() + card.interval * DAY_MS;
    }

    function quality(correct, elapsedMs) {
      if (!correct) return 0;
      if (elapsedMs < cfg.fastMs) return 5;
      if (elapsedMs <= cfg.goodMs) return 4;
      return 2;
    }

    function msgFromQuality(q, correct) {
      if (!correct) return "✗ Incorrect";
      if (q === 5)  return "⚡ Fast!";
      if (q === 4)  return "✓ Good";
      return "🔄 Keep practicing";
    }

    /* ── Card display ── */
    function showCard(id) {
      currentCard = state.cards[id];
      var parts = id.split("x");
      el("question").textContent = parts[0] + " × " + parts[1] + " = ?";
      typed = "";
      renderTyped();
      shownAt = Date.now();
    }

    function renderTyped() {
      el("answerDisplay").textContent = typed || "_";
    }

    function correctAnswer(id) {
      var p = id.split("x");
      return parseInt(p[0], 10) * parseInt(p[1], 10);
    }

    /* ── Visibility helpers ── */
    function showQuiz() {
      el("quizPane").className  = "question-wrap";
      el("keypad").className    = "keypad";
      el("donePane").style.display = "none";
    }

    function showDone() {
      currentCard = null;
      el("quizPane").className  = "question-wrap hidden";
      el("keypad").className    = "keypad hidden";
      el("donePane").style.display = "";
      var avg = ss.times.length > 0 ? (arrSum(ss.times)/ss.times.length).toFixed(1)+"s" : "—";
      el("doneStats").textContent = "Answered: " + ss.answered + "  |  Correct: " + ss.correct + "  |  Avg: " + avg;
      el("pauseBtn").className  = "icon-btn pause-btn hidden";
    }

    function setPauseVisible() {
      var hide = isPaused || isCountdown || !currentCard || el("donePane").style.display === "";
      el("pauseBtn").className = "icon-btn pause-btn" + (hide ? " hidden" : "");
    }

    /* ── Flash ── */
    function flash(kind) {
      document.body.classList.remove("flash-ok","flash-bad");
      document.body.classList.add(kind === "ok" ? "flash-ok" : "flash-bad");
      setTimeout(function(){ document.body.classList.remove("flash-ok","flash-bad"); }, 120);
    }

    /* ── Countdown (callback-based, no async/await) ── */
    function runCountdown(cb) {
      isCountdown = true;
      setPauseVisible();
      var ov = el("overlayCountdown");
      ov.className = "overlay show";
      var seq = ["3","2","1","GO!"];
      var i = 0;
      function step() {
        if (i >= seq.length) {
          ov.className = "overlay";
          isCountdown = false;
          setPauseVisible();
          if (cb) cb();
          return;
        }
        el("countdownNum").textContent = seq[i];
        var delay = seq[i] === "GO!" ? 420 : 1000;
        i++;
        setTimeout(step, delay);
      }
      step();
    }

    /* ── Next card ── */
    function nextCard() {
      updateStats();
      if (sessionQueue.length === 0) {
        showDone();
        return;
      }
      showQuiz();
      showCard(sessionQueue.shift());
      el("dueCount").textContent = "Due: " + sessionQueue.length;
      setPauseVisible();
    }

    /* ── Submit ── */
    function submit() {
      if (!currentCard || typed.length === 0 || isPaused || isCountdown) return;
      var expected = correctAnswer(currentCard.id);
      var entered  = parseInt(typed, 10);
      var correct  = entered === expected;
      var elMs     = Date.now() - shownAt;
      var q        = quality(correct, elMs);

      ss.answered++;
      ss.lastSec = elMs / 1000;
      if (correct) { ss.correct++; ss.streak++; ss.times.push(elMs/1000); }
      else           ss.streak = 0;

      updateSRS(currentCard, q);
      saveState();

      if (correct) {
        flash("ok");
        setFeedback(msgFromQuality(q, true), "ok");
        setTimeout(nextCard, 180);
      } else {
        flash("bad");
        setFeedback(msgFromQuality(q, false) + "  " + currentCard.id.replace("x"," × ") + " = " + expected, "bad");
        setTimeout(nextCard, 560);
      }
    }

    /* ── Input ── */
    function onKey(key) {
      if (isPaused || isCountdown || !currentCard) return;
      if (el("donePane").style.display === "") return;
      if (/^\d$/.test(key)) {
        if (typed.length < 3) { typed += key; renderTyped(); }
      } else if (key === "backspace") {
        typed = typed.slice(0, -1); renderTyped();
      } else if (key === "enter") {
        submit();
      }
    }

    /* ── Pause ── */
    function doPause() {
      if (!currentCard || isPaused || isCountdown) return;
      /* invalidate current card */
      updateSRS(currentCard, 0);
      ss.streak = 0;
      saveState();
      updateStats();
      currentCard = null; typed = ""; renderTyped();
      /* show paused overlay */
      isPaused = true;
      el("quizPane").className  = "question-wrap hidden";
      el("keypad").className    = "keypad hidden";
      el("overlayPaused").className = "overlay show";
      setPauseVisible();
    }

    function doResume() {
      if (!isPaused) return;
      isPaused = false;
      el("overlayPaused").className = "overlay";
      showQuiz();
      runCountdown(nextCard);
    }

    /* ── New session ── */
    function startSession() {
      resetSS();
      buildQueue();
      setFeedback("Get ready…", null);
      showQuiz();
      runCountdown(nextCard);
    }

    /* ── Settings ── */
    function openSettings() {
      el("cfgName").value = cfg.name;
      el("cfgMin").value  = cfg.minT;
      el("cfgMax").value  = cfg.maxT;
      el("cfgFast").value = (cfg.fastMs / 1000).toFixed(1);
      el("cfgGood").value = (cfg.goodMs / 1000).toFixed(1);
      el("overlaySettings").className = "overlay show";
    }

    function saveSettings() {
      cfg.name   = el("cfgName").value.trim();
      cfg.minT   = Math.max(2, Math.min(10, parseInt(el("cfgMin").value,10) || 2));
      cfg.maxT   = Math.max(cfg.minT, Math.min(10, parseInt(el("cfgMax").value,10) || 10));
      cfg.fastMs = Math.max(500, parseFloat(el("cfgFast").value) * 1000 || 1500);
      cfg.goodMs = Math.max(cfg.fastMs + 500, parseFloat(el("cfgGood").value) * 1000 || 3000);
      saveCfg();
      ALL_IDS = buildAllIds();
      state   = loadState();
      updateGreeting();
      updatePlayerName();
      el("overlaySettings").className = "overlay";
    }

    /* ── Reset ── */
    function doReset() {
      if (!window.confirm("Reset all progress? This cannot be undone.")) return;
      state = { cards: seedCards() };
      saveState();
      startSession();
    }

    /* ── Name tap ── */
    el("playerName").addEventListener("click", openSettings);

    /* ── Events ── */
    el("keypad").addEventListener("click", function(e) {
      var t = e.target;
      while (t && t !== el("keypad")) {
        if (t.dataset && t.dataset.key) { onKey(t.dataset.key); return; }
        t = t.parentNode;
      }
    });

    document.addEventListener("keydown", function(e) {
      if (el("overlaySettings").className.indexOf("show") > -1) return;
      if (e.key >= "0" && e.key <= "9") onKey(e.key);
      else if (e.key === "Backspace")    onKey("backspace");
      else if (e.key === "Enter" || e.key === "=") onKey("enter");
    });

    el("pauseBtn").addEventListener("click", doPause);
    el("btnResume").addEventListener("click", doResume);
    el("btnNewSession").addEventListener("click", startSession);
    el("settingsBtn").addEventListener("click", openSettings);
    el("btnSettingsSave").addEventListener("click", saveSettings);
    el("btnReset").addEventListener("click", doReset);

    /* ── Boot ── */
    loadCfg();
    ALL_IDS = buildAllIds();
    state   = loadState();
    updateGreeting();
    updatePlayerName();
    updateStats();
    startSession();

  })();
  </script>
</body>
</html>
